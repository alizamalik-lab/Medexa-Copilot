<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medexa — PT/OT/SLP Clinical Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="20" height="20">
            <path d="M4 24 A14 14 0 0 1 28 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <circle cx="16" cy="24" r="2.5" fill="currentColor"/>
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">Medexa</span>
          <span class="brand-tag">PT · OT · SLP</span>
        </div>
      </div>
      <button id="clear-chat-btn" class="btn-ghost" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Clear chat
      </button>
    </header>

    <main id="chat-container" aria-live="polite">
      <div class="chat-inner">
        <section id="welcome-screen">
          <div class="welcome-badge">US clinical coding assistant</div>
          <h1>What do you want to know today?</h1>
          <p class="welcome-sub">CPT &amp; ICD-10 pairings, MUE limits, PTP edits, and PT/OT/SLP clinical guidance — grounded in your knowledge base.</p>
          <div class="starter-chips">
            <button class="chip" data-prompt="What is CPT 97110?">
              <span class="chip-icon chip-icon-blue" aria-hidden="true">Exercise</span>
              <span class="chip-label">What is therapeutic exercise?</span>
              <span class="chip-hint">Learn about a common PT treatment</span>
            </button>
            <button class="chip" data-prompt="Are there any MUE limits for CPT 97140?">
              <span class="chip-icon chip-icon-amber" aria-hidden="true">Limits</span>
              <span class="chip-label">How many manual therapy units per visit?</span>
              <span class="chip-hint">Medicare unit caps explained</span>
            </button>
            <button class="chip" data-prompt="What ICD-10 codes pair with CPT 92507?">
              <span class="chip-icon chip-icon-coral" aria-hidden="true">Diagnosis</span>
              <span class="chip-label">Which diagnoses pair with speech treatment?</span>
              <span class="chip-hint">Valid ICD-10 for SLP billing</span>
            </button>
            <button class="chip" data-prompt="Can I bill 97110 and 97140 together on the same day?">
              <span class="chip-icon chip-icon-violet" aria-hidden="true">Bundling</span>
              <span class="chip-label">Can exercise and manual therapy be billed same day?</span>
              <span class="chip-hint">Check for PTP edit conflicts</span>
            </button>
          </div>
        </section>
        <div id="messages"></div>
      </div>
    </main>

    <form id="input-container">
      <div class="input-wrapper">
        <div class="input-inner">
          <textarea id="chat-input" placeholder="Ask about a CPT code, ICD-10 pairing, or billing rule…" rows="1"></textarea>
          <button id="send-btn" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 19V5m0 0-6 6m6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <p class="input-footnote">Medexa provides coding guidance — not patient-specific diagnosis or treatment plans.</p>
      </div>
    </form>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
