# Render Blueprint — deploy from Dashboard: New → Blueprint → connect this repo.
# After deploy, set GROQ_API_KEY in the service Environment tab.

services:
  - type: web
    name: medexa-copilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: RAG_URL
        value: http://127.0.0.1:8000
      - key: RAG_CHAT_PATH
        value: /chat
      - key: RAG_TIMEOUT_MS
        value: "120000"
      - key: NODE_ENV
        value: production
      - key: RAG_DIR
        value: /app/chatbot/chatbot
